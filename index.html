<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Speedons 2026</title>
<style>
:root{--bg:#090c12;--s1:#161b22;--s2:#1c2230;--bd:#2d333b;--tx:#cdd9e5;--mu:#768390;--thu:#ff7043;--fri:#29b6f6;--sat:#ab47bc;--sun:#26a69a;--yt:#ff0000;--dj:#7c3aed;--ak:#ec4899;--djbg:rgba(124,58,237,.18);--akbg:rgba(236,72,153,.18)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.5 'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx)}
.hdr{background:linear-gradient(135deg,#0e0a1e,#0a1a18);padding:1.6rem 1.5rem 1.2rem;text-align:center;border-bottom:1px solid var(--bd)}
.hdr h1{font-size:1.9rem;font-weight:900;background:linear-gradient(100deg,var(--thu) 0%,var(--sat) 50%,var(--fri) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{font-size:.8rem;color:var(--mu);margin-top:.3rem}.hdr p b{color:var(--tx)}
.pills{display:flex;justify-content:center;gap:.45rem;flex-wrap:wrap;margin-top:.7rem}
.pill{font-size:.68rem;font-weight:700;padding:.18rem .7rem;border-radius:99px;border:1px solid currentColor}
.p-thu{color:var(--thu);background:rgba(255,112,67,.07)}.p-fri{color:var(--fri);background:rgba(41,182,246,.07)}
.p-sat{color:var(--sat);background:rgba(171,71,188,.07)}.p-sun{color:var(--sun);background:rgba(38,166,154,.07)}
.tabs{display:flex;gap:.3rem;padding:.55rem .9rem;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;overflow-x:auto}
.tab{flex-shrink:0;padding:.4rem .85rem;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--mu);font:700 .73rem/1 inherit;cursor:pointer;transition:all .15s}
.tab:hover{background:var(--s2);color:var(--tx)}
.on-thu{background:var(--thu)!important;border-color:var(--thu)!important;color:#fff!important}
.on-fri{background:var(--fri)!important;border-color:var(--fri)!important;color:#000!important}
.on-sat{background:var(--sat)!important;border-color:var(--sat)!important;color:#fff!important}
.on-sun{background:var(--sun)!important;border-color:var(--sun)!important;color:#fff!important}
.wrap{max-width:900px;margin:0 auto;padding:.9rem .9rem 3rem}
.panel{display:none}.panel.on{display:block}
.day-info{font-size:.7rem;color:var(--mu);padding:0 .1rem .65rem}

/* legend */
.legend{display:flex;gap:.7rem;flex-wrap:wrap;margin-bottom:.75rem}
.leg{display:flex;align-items:center;gap:.35rem;font-size:.7rem;color:var(--mu)}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.leg-dj{background:var(--dj)}.leg-ak{background:var(--ak)}
.leg-both{background:linear-gradient(90deg,var(--dj) 50%,var(--ak) 50%)}

/* row */
.row{display:flex;align-items:center;gap:.5rem;padding:.45rem .7rem;border-left:3px solid transparent;border-bottom:1px solid rgba(255,255,255,.04);min-height:42px;transition:background .15s,box-shadow .15s;position:relative}
.row:hover:not(.sp){filter:brightness(1.07)}
.bl-thu{border-left-color:var(--thu)!important}.bl-fri{border-left-color:var(--fri)!important}
.bl-sat{border-left-color:var(--sat)!important}.bl-sun{border-left-color:var(--sun)!important}
.row.sp{opacity:.5}

/* color states */
.row.dj-only{background:var(--djbg)}
.row.ak-only{background:var(--akbg)}
.row.both{background:linear-gradient(90deg,var(--djbg) 50%,var(--akbg) 50%)}

.r-t{font:700 .72rem/1 monospace;color:var(--mu);min-width:36px;flex-shrink:0}
.r-g{flex:1;font:600 .85rem/1.25 inherit;min-width:0}
.r-c{font-size:.64rem;color:#79c0ff;background:rgba(79,161,255,.08);border:1px solid rgba(79,161,255,.18);padding:.1rem .38rem;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;flex-shrink:0}
.r-p{font-size:.67rem;color:var(--mu);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px;flex-shrink:0}

/* YouTube btn */
.ytbtn{display:inline-flex;align-items:center;gap:.28rem;flex-shrink:0;padding:.2rem .5rem;border-radius:5px;background:rgba(255,0,0,.08);border:1px solid rgba(255,0,0,.22);color:var(--yt);font:700 .63rem/1 inherit;text-decoration:none;transition:all .15s;white-space:nowrap}
.ytbtn:hover{background:rgba(255,0,0,.18);border-color:rgba(255,0,0,.5)}
.ytbtn svg{width:9px;height:9px;fill:currentColor;flex-shrink:0}

/* checkboxes */
.checks{display:flex;gap:.35rem;flex-shrink:0;align-items:center}
.chk-wrap{display:flex;flex-direction:column;align-items:center;gap:.15rem;cursor:pointer}
.chk-wrap input[type=checkbox]{appearance:none;-webkit-appearance:none;width:15px;height:15px;border-radius:3px;border:1.5px solid var(--bd);background:transparent;cursor:pointer;transition:all .15s;flex-shrink:0}
.chk-dj input[type=checkbox]:checked{background:var(--dj);border-color:var(--dj)}
.chk-ak input[type=checkbox]:checked{background:var(--ak);border-color:var(--ak)}
.chk-wrap input[type=checkbox]:hover{border-color:#666}
.chk-label{font-size:.52rem;font-weight:700;line-height:1;white-space:nowrap}
.chk-dj .chk-label{color:var(--dj)}
.chk-ak .chk-label{color:var(--ak)}

@media(max-width:580px){.r-c,.r-p{display:none}.r-g{font-size:.8rem}}
</style>
</head>

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function updateRow(row){
  const dj=row.querySelector('.cb-dj').checked;
  const ak=row.querySelector('.cb-ak').checked;
  row.classList.remove('dj-only','ak-only','both');
  if(dj&&ak) row.classList.add('both');
  else if(dj) row.classList.add('dj-only');
  else if(ak) row.classList.add('ak-only');
}

async function saveCheck(key,val){
  try{ await window.storage.set(key, val?'1':'0', true); }catch(e){}
}

async function loadAll(){
  try{
    const keys=await window.storage.list('chk:', true);
    if(!keys||!keys.keys) return;
    for(const k of keys.keys){
      try{
        const r=await window.storage.get(k, true);
        if(!r||r.value!=='1') continue;
        const cb=document.querySelector(`[data-skey="${k}"]`);
        if(cb){ cb.checked=true; updateRow(cb.closest('.row')); }
      }catch(e){}
    }
  }catch(e){}
}

// Poll for remote changes every 10s
setInterval(async()=>{
  try{
    const keys=await window.storage.list('chk:', true);
    if(!keys||!keys.keys) return;
    for(const k of keys.keys){
      try{
        const r=await window.storage.get(k, true);
        const cb=document.querySelector(`[data-skey="${k}"]`);
        if(!cb) continue;
        const val=r&&r.value==='1';
        if(cb.checked!==val){ cb.checked=val; updateRow(cb.closest('.row')); }
      }catch(e){}
    }
  }catch(e){}
}, 10000);

function switchDay(i){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.className='tab');
  document.getElementById('p'+i).classList.add('on');
  document.querySelectorAll('.tab')[i].classList.add('on-'+DAYS[i].k);
}

function build(){
  const tabsEl=document.getElementById('tabs');
  const wrapEl=document.getElementById('wrap');
  DAYS.forEach((day,di)=>{
    const tab=document.createElement('button');
    tab.className='tab'+(di===0?' on-'+day.k:'');
    tab.textContent=day.l;
    tab.onclick=()=>switchDay(di);
    tabsEl.appendChild(tab);

    const panel=document.createElement('div');
    panel.id='p'+di;
    panel.className='panel'+(di===0?' on':'');
    const nb=day.runs.filter(r=>!r.sp).length;

    panel.innerHTML=`
      <div class="day-info">${day.runs.length} entrées &nbsp;·&nbsp; ${nb} runs</div>
      <div class="legend">
        <span class="leg"><span class="leg-dot leg-dj"></span>DJesus</span>
        <span class="leg"><span class="leg-dot leg-ak"></span>xAkito</span>
        <span class="leg"><span class="leg-dot leg-both"></span>Les deux</span>
      </div>`;

    const list=document.createElement('div');
    list.style.cssText='background:var(--s1);border:1px solid var(--bd);border-radius:8px;overflow:hidden';

    day.runs.forEach((run,ri)=>{
      const row=document.createElement('div');
      row.className=`row bl-${day.k}${run.sp?' sp':''}`;

      const ytBtn=run.y
        ?`<a class="ytbtn" href="${esc(run.y)}" target="_blank" rel="noopener">${YT_ICON} Trailer</a>`
        :'';

      const keyDj=`chk:${di}-${ri}-dj`;
      const keyAk=`chk:${di}-${ri}-ak`;
      const checks=run.sp?'':`
        <div class="checks">
          <label class="chk-wrap chk-dj" title="DJesus">
            <input type="checkbox" class="cb-dj" data-skey="${keyDj}">
            <span class="chk-label">DJ</span>
          </label>
          <label class="chk-wrap chk-ak" title="xAkito">
            <input type="checkbox" class="cb-ak" data-skey="${keyAk}">
            <span class="chk-label">AK</span>
          </label>
        </div>`;

      row.innerHTML=`
        <span class="r-t">${esc(run.t)}</span>
        <span class="r-g">${esc(run.g)}</span>
        ${run.c?`<span class="r-c">${esc(run.c)}</span>`:''}
        <span class="r-p">${esc(run.p)}</span>
        ${ytBtn}
        ${checks}`;

      if(!run.sp){
        const cbDj=row.querySelector('.cb-dj');
        const cbAk=row.querySelector('.cb-ak');
        cbDj.addEventListener('change',()=>{ updateRow(row); saveCheck(keyDj,cbDj.checked); });
        cbAk.addEventListener('change',()=>{ updateRow(row); saveCheck(keyAk,cbAk.checked); });
      }
      list.appendChild(row);
    });
    panel.appendChild(list);
    wrapEl.appendChild(panel);
  });
}
build();
loadAll();
</script>
